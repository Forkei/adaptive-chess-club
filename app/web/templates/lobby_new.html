{% extends "base.html" %}

{% block title %}Open a room — Metropolis Chess Club{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto mp-enter mp-enter-1">
  <div class="mp-eyebrow mb-2">Threshold</div>
  <h1 class="mp-display text-[32px] leading-[1] tracking-tight mb-2">Open a new room</h1>
  <p class="text-[13px] text-[var(--mp-ink-muted)] mb-6">
    Pick your vibe. You can change everything from inside the room.
  </p>

  <form method="post" action="/lobby/new" class="space-y-5 mp-panel rounded-sm p-6">
    <fieldset class="space-y-3">
      <legend class="mp-eyebrow px-0">Access</legend>
      <label class="flex items-start gap-3 cursor-pointer">
        <input type="checkbox" name="is_private" class="mt-1 accent-[var(--mp-brass)]" />
        <div>
          <div class="mp-display text-[15px]">Private — door closed</div>
          <div class="text-[12px] text-[var(--mp-ink-faint)]">Not listed publicly. Share the invite code with whoever you want in.</div>
        </div>
      </label>
      <label class="flex items-start gap-3 cursor-pointer">
        <input type="checkbox" name="allow_spectators" checked class="mt-1 accent-[var(--mp-brass)]" />
        <div>
          <div class="mp-display text-[15px]">Allow spectators</div>
          <div class="text-[12px] text-[var(--mp-ink-faint)]">Strangers can watch but not play. Toggle the lock any time from inside.</div>
        </div>
      </label>
    </fieldset>

    <fieldset class="space-y-3">
      <legend class="mp-eyebrow px-0">Radio</legend>
      <select name="music_track" class="mp-input w-full">
        <option value="">— silent —</option>
        {% for t in known_music_tracks %}
          {% if t != "none" %}<option value="{{ t }}">{{ t }}</option>{% endif %}
        {% endfor %}
      </select>
      <label class="block">
        <span class="mp-eyebrow block mb-1 text-[10px]">Volume</span>
        <input type="range" name="music_volume" min="0" max="1" step="0.05" value="0.5" class="w-full accent-[var(--mp-brass)]" />
      </label>
    </fieldset>

    <fieldset class="space-y-3">
      <legend class="mp-eyebrow px-0">Lights</legend>
      <label class="block">
        <span class="mp-eyebrow block mb-1 text-[10px]">Brightness</span>
        <input type="range" name="lights_brightness" min="0.1" max="1" step="0.05" value="0.7" class="w-full accent-[var(--mp-brass)]" />
      </label>
      <label class="block">
        <span class="mp-eyebrow block mb-1 text-[10px]">Hue</span>
        <input type="color" name="lights_hue" value="#C9A66B" class="w-20 h-9 bg-transparent border border-[var(--mp-hairline-2)] rounded-sm" />
      </label>
    </fieldset>

    <button class="mp-btn mp-btn-brass w-full justify-center" style="padding: 0.65rem 1rem;">
      Open the room ›
    </button>
  </form>

  <div class="mt-4 text-center text-[12px]">
    <a href="/lobbies" class="mp-link">← back to rooms</a>
  </div>
</div>
{% endblock %}
